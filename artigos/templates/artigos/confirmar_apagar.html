{% extends 'portfolio/base.html' %}

{% block content %}
<h2>Apagar Artigo</h2>
<p>Tens a certeza que queres apagar este artigo?</p>
<blockquote>{{ artigo.texto|truncatechars:200 }}</blockquote>
<form method="post">
    {% csrf_token %}
    <button type="submit" style="background:#dc2626;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer">Apagar</button>
    <a href="{% url 'artigos_lista' %}">Cancelar</a>
</form>
{% endblock %}
